<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Deep Space Dark Background -->
  <rect width="64" height="64" rx="18" fill="#130524" />
  
  <!-- Outer glowing border ring -->
  <rect width="64" height="64" rx="18" stroke="url(#border)" stroke-width="3" />
  
  <!-- Stylized Italic 'S' representing Surpass -->
  <text x="32" y="47" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="46" fill="url(#sGrad)" text-anchor="middle" font-style="italic">S</text>
  
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EC4899"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="sGrad" x1="20" y1="10" x2="44" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.5" stop-color="#E9D5FF"/>
      <stop offset="1" stop-color="#9333EA"/>
    </linearGradient>
  </defs>
</svg>
